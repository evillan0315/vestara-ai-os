name: Nightly Build

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '22'

jobs:
  build:
    name: Nightly Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test
        continue-on-error: true

      - name: Build .deb packages
        run: |
          chmod +x scripts/build-deb.sh
          ./scripts/build-deb.sh
        continue-on-error: true

      - name: Generate nightly version
        id: version
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "version=0.0.0-nightly.$DATE.$SHORT_SHA" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ steps.version.outputs.version }}
          path: |
            dist/deb/*.deb
            packages/*/dist
            services/*/dist
            apps/*/dist
          retention-days: 7

  docker:
    name: Build Nightly Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate nightly tag
        id: tag
        run: |
          DATE=$(date +%Y%m%d)
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=nightly.$DATE.$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/api:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: ghcr.io/${{ github.repository }}/dashboard:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  cleanup:
    name: Cleanup Old Nightlies
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - name: Delete old nightly artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });
            
            const nightlies = artifacts.data.artifacts.filter(a => 
              a.name.startsWith('nightly-')
            );
            
            const toDelete = nightlies.slice(7);
            
            for (const artifact of toDelete) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id
              });
              console.log(`Deleted ${artifact.name}`);
            }
